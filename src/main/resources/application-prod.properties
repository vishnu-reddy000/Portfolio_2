spring.application.name=backend

# MySQL Database configuration (production overrides via environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/portfoliodb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.org.hibernate.SQL=WARN

# Cloudinary configuration (production overrides via environment variables)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dp08coqkk}
cloudinary.api-key=${CLOUDINARY_API_KEY:184743115714473}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:5HRkeI_Eh1VZmpuXkY-VkUKInuQ}

# Multipart Upload Limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
